<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0176d3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1b96ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9f1c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Cloud shape (Salesforce-inspired) -->
  <g transform="translate(12, 16)">
    <!-- Main cloud body -->
    <path d="
      M 38 98
      C 18 98, 4 84, 4 68
      C 4 52, 16 40, 32 38
      C 34 22, 48 10, 66 10
      C 80 10, 92 18, 98 30
      C 102 28, 106 26, 112 26
      C 126 26, 136 38, 136 50
      C 136 52, 136 54, 135 56
      C 145 60, 152 70, 152 82
      C 152 96, 140 106, 126 106
      L 38 106
      Z
    " fill="url(#cloudGrad)" />

    <!-- f(x) text inside cloud -->
    <text x="54" y="78" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-style="italic" font-weight="bold" fill="white" text-anchor="middle">f</text>
    <text x="78" y="68" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-style="italic" fill="url(#fxGrad)" text-anchor="middle" font-weight="bold">(x)</text>
  </g>

  <!-- Project name -->
  <text x="178" y="72" font-family="'SF Pro Display', -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#032d60" letter-spacing="-0.5">
    <tspan>sf-formula-parser</tspan>
  </text>

  <!-- Tagline -->
  <text x="178" y="100" font-family="'SF Pro Display', -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#6b7280" letter-spacing="0.3">
    Salesforce formulas, everywhere
  </text>
</svg>
